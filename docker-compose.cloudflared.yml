# Cloudflare Tunnel — public ingress for the home-server VM (dynamic IP + NAT).
#
# Deploy as a SEPARATE Dokploy "Docker Compose" app. cloudflared makes an
# OUTBOUND connection to Cloudflare — so NO port-forwarding, NO static IP, and
# NO Let's Encrypt (Cloudflare's edge terminates public TLS). It joins
# dokploy-network so it can reach the app containers by service name.
#
# Public hostname → container mappings are configured in the Cloudflare Zero
# Trust dashboard (this tunnel → Public Hostnames), NOT here:
#   api.farmsteadflow.com    -> HTTP  api:3000
#   app.farmsteadflow.com    -> HTTP  web:3000
#   admin.farmsteadflow.com  -> HTTP  admin:3002
#   pazar.farmsteadflow.com  -> HTTP  <pazar service>:3003
#
# Set CF_TUNNEL_TOKEN in this Dokploy app's Environment (the tunnel token).

services:
  cloudflared:
    # Pinned for reproducible deploys — bump deliberately, not implicitly via :latest.
    image: cloudflare/cloudflared:2026.6.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    networks: [dokploy-network]

networks:
  dokploy-network:
    external: true
