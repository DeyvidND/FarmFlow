# ФермериБГ core stack — single Hetzner box, plain docker compose (no Dokploy).
# postgres + redis + api + web + admin + econt (standalone delivery) + cloudflared tunnel.
# Public ingress = Cloudflare Tunnel (outbound) — no host ports, no TLS here.
# api loads the full secret set via env_file (.env) for parity with the old
# Dokploy env; DATABASE_URL / REDIS_URL are overridden to the new internal hosts.
name: fermeribg

services:
  postgres:
    image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
    restart: unless-stopped
    environment:
      POSTGRES_DB: farmflow
      POSTGRES_USER: farmflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmflow -d farmflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set in .env}", "--maxmemory", "1gb", "--maxmemory-policy", "noeviction"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set in .env}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/deyvidnd/farmflow-api:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: [.env]
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://farmflow:${POSTGRES_PASSWORD}@postgres:5432/farmflow
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # Target origin for the delivery-account set-password ("invite") link the api
      # mints on createDeliveryAccount — must point at the delivery panel, not the
      # farmer panel (PUBLIC_APP_URL).
      DELIVERY_PUBLIC_URL: https://dostavki.fermeribg.com

  web:
    image: ghcr.io/deyvidnd/farmflow-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on: [api]
    environment:
      NODE_ENV: production
      API_URL: http://api:3000
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}

  admin:
    image: ghcr.io/deyvidnd/farmflow-admin:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on: [api]
    environment:
      NODE_ENV: production
      API_URL: http://api:3000

  # Standalone delivery app (dostavki.fermeribg.com). SAME image as api, different
  # entrypoint (dist/main.econt.js, listens on 3100). APP_ROLE=web so the Econt/Speedy
  # 30-min refresh crons run ONLY in the api container — this one must NOT double-run
  # them. No published port: the Cloudflare tunnel routes the hostname to econt:3100
  # over the compose network. depends_on api so DB migrations (api runs them on boot)
  # are applied before this starts.
  econt:
    image: ghcr.io/deyvidnd/farmflow-api:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    command: ["node", "dist/main.econt.js"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      api: { condition: service_started }
    env_file: [.env]
    environment:
      NODE_ENV: production
      APP_ROLE: web
      PORT_ECONT: "3100"
      DATABASE_URL: postgresql://farmflow:${POSTGRES_PASSWORD}@postgres:5432/farmflow
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CORS_ORIGIN_ECONT: https://dostavki.fermeribg.com
    healthcheck:
      # The shared api image's default HEALTHCHECK probes $PORT||3000, but this
      # process listens on PORT_ECONT (3100) and serves its own GET /health
      # liveness route — override to hit the right port.
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3

  # Delivery panel (dostavki.fermeribg.com) — the Next.js standalone app from the
  # delivery-web/ workspace, listening on 3003. The tunnel routes the hostname here;
  # it proxies to econt:3100 internally via its BFF (/bff). No published host port:
  # the Cloudflare tunnel reaches it over the compose network as delivery-web:3003.
  delivery-web:
    image: ghcr.io/deyvidnd/farmflow-delivery-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on: [econt]
    environment:
      NODE_ENV: production
      API_URL: http://econt:3100

  # Public, non-tunnel TLS origin for the API (origin-api.fermeribg.com) so the
  # Astro storefront Workers fetch the backend DIRECTLY instead of hairpinning the
  # CF tunnel (which intermittently black-holes worker->tunnel subrequests). Custom
  # Caddy image (caddy-dns/cloudflare) gets a public Let's Encrypt cert via ACME
  # DNS-01 — no inbound :80 — so host 443 can be firewalled to Cloudflare IPs only.
  # Build context ./caddy must exist on the box (scp'd by hand; CI only syncs this
  # compose). The api.fermeribg.com tunnel is untouched (panel/admin + fallback).
  caddy:
    build: ./caddy
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:?set in .env}
    volumes:
      - caddydata:/data
      - caddyconfig:/config
    depends_on: [api]

  cloudflared:
    image: cloudflare/cloudflared:2026.6.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:-}
    # http2 transport (TCP) is more stable than the default QUIC (UDP), which was
    # silently dropping the tunnel. Metrics on :2000 (localhost only) feed the
    # host watchdog (/opt/fermeribg/tunnel-watchdog.sh via cron) that restarts
    # cloudflared if /ready stops returning 200.
    environment:
      TUNNEL_TRANSPORT_PROTOCOL: http2
      TUNNEL_METRICS: 0.0.0.0:2000
    ports:
      - "127.0.0.1:2000:2000"
    depends_on: [api, web, admin, econt, delivery-web]

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
