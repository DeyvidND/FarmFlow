services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: farmflow
      POSTGRES_USER: farmflow
      POSTGRES_PASSWORD: farmflow
    ports:
      # Bind to loopback only — dev DB must not be reachable from the LAN.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      # Bind to loopback only — dev cache must not be reachable from the LAN.
      - "127.0.0.1:6379:6379"
volumes:
  postgres_data:
