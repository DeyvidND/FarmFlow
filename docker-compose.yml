services:
  postgres:
    image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
    environment:
      POSTGRES_DB: farmflow
      POSTGRES_USER: farmflow
      POSTGRES_PASSWORD: farmflow
    ports:
      # Bind to loopback only — dev DB must not be reachable from the LAN.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    ports:
      # Bind to loopback only — dev cache must not be reachable from the LAN.
      - "127.0.0.1:6379:6379"
volumes:
  postgres_data:
