name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: farmflow_test
          POSTGRES_USER: farmflow
          POSTGRES_PASSWORD: farmflow
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U farmflow -d farmflow_test"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgres://farmflow:farmflow@localhost:5432/farmflow_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-prod
      ENCRYPTION_KEY: ci-test-encryption-key-not-for-prod
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Migrate test database
        run: pnpm db:migrate

      - name: Test (API)
        run: pnpm --filter @farmflow/api test
