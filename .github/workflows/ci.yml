name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The suite itself lives in test.yml so deploy.yml gates on the SAME
  # definition CI runs here, rather than a copy that can drift.
  build-test:
    uses: ./.github/workflows/test.yml

  docs-freshness:
    name: Docs freshness (warn-only)
    runs-on: ubuntu-latest
    # Never blocks CI: surfaces doc/code drift as a warning only.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check docs invariants
        run: node scripts/check-docs-fresh.mjs   # exits 0 (warn-only) unless --strict
