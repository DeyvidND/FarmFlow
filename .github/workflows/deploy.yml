name: Deploy to Production

# Build the app images (+ a migrator image) and push them to GHCR, then SSH to
# the Hetzner box: apply pending DB migrations, then `docker compose pull && up`.
# CI (build/lint/test) runs separately in ci.yml.
on:
  push:
    branches: [main]
    # App-code deploys only — infra docs / markdown changes don't redeploy.
    paths-ignore:
      - 'infra/**'
      - '.codex/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build & push (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            image: ghcr.io/deyvidnd/farmflow-api
            dockerfile: server/Dockerfile
            build_args: ''
          - app: web
            image: ghcr.io/deyvidnd/farmflow-web
            dockerfile: client/Dockerfile
            build_args: |
              NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ vars.FF_MAPS_BROWSER_KEY }}
              NEXT_PUBLIC_SENTRY_DSN=${{ vars.FF_SENTRY_DSN_PANEL }}
          - app: admin
            image: ghcr.io/deyvidnd/farmflow-admin
            dockerfile: admin/Dockerfile
            build_args: |
              NEXT_PUBLIC_SENTRY_DSN=${{ vars.FF_SENTRY_DSN_ADMIN }}
          - app: delivery-web
            image: ghcr.io/deyvidnd/farmflow-delivery-web
            dockerfile: delivery-web/Dockerfile
            build_args: ''
          # One-off migrator: applies pending Drizzle migrations to DATABASE_URL,
          # run by the deploy job BEFORE the app images below come up. Closes the
          # gap that caused the 2026-07-12 outage (a migration was pushed but
          # never applied, so the new app code 500'd on a missing column).
          - app: migrate
            image: ghcr.io/deyvidnd/farmflow-migrate
            dockerfile: packages/db/Dockerfile.migrate
            build_args: ''
          # NOTE: no public storefront is built here. The shops live in their own
          # repos with their own pipelines: the chaika shop (Astro → CF) and the
          # marketplace (farmflow-marketplace-next → CF). This compose ships only
          # api + web + admin + delivery-web.
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      # Sync the compose file to the box so service/topology changes (e.g. adding the
      # `econt` delivery service) ship with a normal deploy — no manual copy. Secrets
      # still live only in the box's .env (NOT synced). `strip_components: 2` drops the
      # `infra/hetzner/` prefix so the file lands at /opt/fermeribg/docker-compose.yml.
      - uses: actions/checkout@v4
      - name: Sync compose to box
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: infra/hetzner/docker-compose.yml
          target: /opt/fermeribg/
          strip_components: 2

      # SSH to the Hetzner box (plain docker compose, no Dokploy) and pull + up
      # the freshly-built :latest images. The stack lives at /opt/fermeribg.
      # Required: var HETZNER_HOST; secrets HETZNER_SSH_KEY (private key for root)
      # and GHCR_PAT (read:packages, so the box can pull the private images).
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u DeyvidND --password-stdin
            cd /opt/fermeribg

            # Apply any pending Drizzle migrations BEFORE the new app images come
            # up, so code that depends on a new column/table never races ahead of
            # the schema (the 2026-07-12 outage: a migration was pushed but never
            # applied, and the new code 500'd on the missing column). Idempotent —
            # already-applied migrations are no-ops (drizzle tracks them in
            # drizzle.__drizzle_migrations; hand-written SQL also uses IF NOT
            # EXISTS as a second safety net).
            docker pull ghcr.io/deyvidnd/farmflow-migrate:latest
            PGPW=$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)
            docker run --rm --network fermeribg_default \
              -e DATABASE_URL="postgresql://farmflow:${PGPW}@10.0.0.3:5432/farmflow" \
              ghcr.io/deyvidnd/farmflow-migrate:latest

            docker compose pull api web admin econt delivery-web worker
            docker compose up -d
            docker image prune -f
            docker compose ps
