name: Deploy to Production

# Build all four app images and push them to GHCR, then ping Dokploy to pull +
# redeploy. CI (build/lint/test) runs separately in ci.yml.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build & push (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            image: ghcr.io/deyvidnd/farmflow-api
            dockerfile: server/Dockerfile
            build_args: ''
          - app: web
            image: ghcr.io/deyvidnd/farmflow-web
            dockerfile: client/Dockerfile
            build_args: |
              NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ vars.FF_MAPS_BROWSER_KEY }}
              NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ vars.FF_STRIPE_PUBLISHABLE_KEY }}
          - app: admin
            image: ghcr.io/deyvidnd/farmflow-admin
            dockerfile: admin/Dockerfile
            build_args: ''
          # NOTE: the monorepo Next.js storefront is NOT deployed — the public
          # shop is the separate Astro repo (fermerski-pazar-chaika), which has
          # its own build → GHCR → Dokploy pipeline. The storefront/ workspace is
          # kept for local dev only.
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy:
    name: Trigger Dokploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - name: Ping Dokploy redeploy webhook
        # The whole monorepo runs as ONE Dokploy "Docker Compose" app
        # (docker-compose.prod.yml → api + web + admin + storefront). One app =
        # one webhook. It pulls the freshly-built :latest images and restarts.
        run: |
          if [ -n "${{ secrets.DOKPLOY_FARMFLOW_WEBHOOK }}" ]; then
            curl -fsSL -X POST "${{ secrets.DOKPLOY_FARMFLOW_WEBHOOK }}" && echo "triggered farmflow redeploy"
          else
            echo "DOKPLOY_FARMFLOW_WEBHOOK not set — skipping (build + push still ran)"
          fi
