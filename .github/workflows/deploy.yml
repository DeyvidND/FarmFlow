name: Deploy to Production

# Build the three app images and push them to GHCR, then SSH to the Hetzner box
# and `docker compose pull && up`. CI (build/lint/test) runs separately in ci.yml.
on:
  push:
    branches: [main]
    # App-code deploys only — infra docs / markdown changes don't redeploy.
    paths-ignore:
      - 'infra/**'
      - '.codex/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build & push (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            image: ghcr.io/deyvidnd/farmflow-api
            dockerfile: server/Dockerfile
            build_args: ''
          - app: web
            image: ghcr.io/deyvidnd/farmflow-web
            dockerfile: client/Dockerfile
            build_args: |
              NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ vars.FF_MAPS_BROWSER_KEY }}
              NEXT_PUBLIC_SENTRY_DSN=${{ vars.FF_SENTRY_DSN_PANEL }}
          - app: admin
            image: ghcr.io/deyvidnd/farmflow-admin
            dockerfile: admin/Dockerfile
            build_args: |
              NEXT_PUBLIC_SENTRY_DSN=${{ vars.FF_SENTRY_DSN_ADMIN }}
          - app: delivery-web
            image: ghcr.io/deyvidnd/farmflow-delivery-web
            dockerfile: delivery-web/Dockerfile
            build_args: ''
          # NOTE: the monorepo Next.js storefront is NOT deployed — the public
          # shop is the separate Astro repo (fermerski-pazar-chaika), which has
          # its own build → GHCR → Dokploy pipeline. The storefront/ workspace is
          # kept for local dev only.
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      # Sync the compose file to the box so service/topology changes (e.g. adding the
      # `econt` delivery service) ship with a normal deploy — no manual copy. Secrets
      # still live only in the box's .env (NOT synced). `strip_components: 2` drops the
      # `infra/hetzner/` prefix so the file lands at /opt/fermeribg/docker-compose.yml.
      - uses: actions/checkout@v4
      - name: Sync compose to box
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: infra/hetzner/docker-compose.yml
          target: /opt/fermeribg/
          strip_components: 2

      # SSH to the Hetzner box (plain docker compose, no Dokploy) and pull + up
      # the freshly-built :latest images. The stack lives at /opt/fermeribg.
      # Required: var HETZNER_HOST; secrets HETZNER_SSH_KEY (private key for root)
      # and GHCR_PAT (read:packages, so the box can pull the private images).
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u DeyvidND --password-stdin
            cd /opt/fermeribg
            docker compose pull api web admin econt delivery-web
            docker compose up -d
            docker image prune -f
            docker compose ps
