# Production — one VM via Dokploy.
#
# Deploy as a Dokploy "Docker Compose" application (Source: this Git repo).
# Dokploy PULLS the GHCR images built by .github/workflows/deploy.yml — no
# `build:` blocks, so nothing compiles on the VM. Traefik (via the labels) routes
# each app's domain and issues TLS. All services join the shared external
# `dokploy-network`.
#
# Postgres + Redis: provision them as Dokploy "Databases" (managed) and put their
# connection strings in DATABASE_URL / REDIS_URL below (set in the Dokploy env).
#
# Env: set every ${VAR} in the Dokploy application's Environment. The full list
# (with descriptions) is in .env.production.example. NEXT_PUBLIC_* for web/
# storefront are BAKED INTO THE IMAGE at build time (see deploy.yml build-args),
# NOT set here.
#
# Run DB migrations once after the first image is built (NOT seed):
#   pnpm db:migrate   # with DATABASE_URL pointed at the managed Postgres

services:
  api:
    image: ghcr.io/deyvidnd/farmflow-api:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    networks: [dokploy-network]
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      # First-boot super-admin bootstrap (seeded once if platform_admins is empty).
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      STOREFRONT_URL: ${STOREFRONT_URL}
      # Stripe (live)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CONNECT_WEBHOOK_SECRET: ${STRIPE_CONNECT_WEBHOOK_SECRET}
      STRIPE_BILLING_PRICE_ID: ${STRIPE_BILLING_PRICE_ID}
      STRIPE_PLATFORM_FEE_BPS: ${STRIPE_PLATFORM_FEE_BPS:-0}
      STRIPE_CONNECT_COUNTRY: ${STRIPE_CONNECT_COUNTRY:-BG}
      # Cloudflare R2
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      # Email / Resend
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_TRANSACTIONAL_FROM: ${EMAIL_TRANSACTIONAL_FROM}
      EMAIL_BULK_FROM: ${EMAIL_BULK_FROM}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET}
      EMAIL_WEBHOOK_SECRET: ${EMAIL_WEBHOOK_SECRET}
      EMAIL_WEBHOOK_VERIFY: ${EMAIL_WEBHOOK_VERIFY:-true}
      # Sentry error monitoring — runtime, no-op unless set (see instrument.ts).
      # Each app gets its OWN Sentry project DSN; all set in the Dokploy env.
      SENTRY_DSN: ${SENTRY_DSN_API:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ff-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.ff-api.entrypoints=websecure"
      - "traefik.http.routers.ff-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.ff-api.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"

  web:
    image: ghcr.io/deyvidnd/farmflow-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    networks: [dokploy-network]
    environment:
      NODE_ENV: production
      # Backend base for the web app's server-side fetches (BFF proxy + session
      # route handlers) — internal service DNS, no public hop.
      API_URL: http://api:3000
      # Google Maps (route screen) — ONE runtime key for the map (Maps JavaScript
      # API) + the address autocomplete (Places API New). Read server-side at request
      # time (the route page is force-dynamic) and passed to the client as a prop, so
      # it's NOT baked into the bundle and changes with a redeploy. The key needs both
      # APIs enabled.
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      # Sentry (farmer panel): DSN is baked into the image at BUILD time from the
      # GitHub repo variable FF_SENTRY_DSN_PANEL (deploy.yml → NEXT_PUBLIC_SENTRY_DSN),
      # not set here. Changing it requires a rebuild, not just a redeploy.
    depends_on: [api]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ff-web.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.ff-web.entrypoints=websecure"
      - "traefik.http.routers.ff-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.ff-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"

  admin:
    image: ghcr.io/deyvidnd/farmflow-admin:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    networks: [dokploy-network]
    environment:
      NODE_ENV: production
      API_URL: http://api:3000
      # Sentry (super-admin panel): DSN baked at BUILD time from the GitHub repo
      # variable FF_SENTRY_DSN_ADMIN (deploy.yml → NEXT_PUBLIC_SENTRY_DSN), not here.
    depends_on: [api]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ff-admin.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.ff-admin.entrypoints=websecure"
      - "traefik.http.routers.ff-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.ff-admin.loadbalancer.server.port=3002"
      - "traefik.docker.network=dokploy-network"

# NOTE: the monorepo Next.js storefront is intentionally NOT deployed here. The
# public shop is the separate Astro repo (fermerski-pazar-chaika) with its own
# compose + build pipeline. This compose ships only api + web + admin.

networks:
  dokploy-network:
    external: true
