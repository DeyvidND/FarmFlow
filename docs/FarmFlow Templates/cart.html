<!DOCTYPE html>
<html lang="bg" data-theme="priroda">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Количка · Горска Градина</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Commissioner:wght@300;400;500;600;700&family=Onest:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ff_theme')||'priroda')}catch(e){}</script>
<link rel="stylesheet" href="assets/theme.css">
<link rel="stylesheet" href="assets/main.css">
<link rel="stylesheet" href="assets/home-themes.css">
</head>
<body>
<div id="site-header" data-active="cart.html"></div>

<main data-screen-label="Cart">
  <div class="wrap">
    <nav class="breadcrumb"><a href="home.html">Начало</a> / <span>Количка</span></nav>
  </div>

  <section class="section--tight is-optional">
    <div class="wrap">
      <span class="opt-inline opt-badge">Опционален модул · количка/поръчки</span>
      <h1 style="font-size:clamp(30px,4.5vw,46px);margin-bottom:24px">Твоята количка</h1>
      <div id="cartArea"></div>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script src="assets/app.js"></script>
<script>
  const I = window.FFICON;
  const area = document.getElementById("cartArea");

  function render() {
    const items = FFCart.get();
    if (!items.length) {
      area.innerHTML = `
        <div class="empty-state">
          <div class="ph"><span class="ph__label">празна<br>количка</span></div>
          <h2 style="font-size:28px;margin-bottom:10px">Количката е празна</h2>
          <p class="muted" style="margin-bottom:24px">Разгледай свежата реколта и добави любимите си плодове.</p>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <a href="products.html" class="btn btn--primary">Към продуктите</a>
            <button class="btn btn--ghost" id="demoFill">Зареди примерна количка</button>
          </div>
        </div>`;
      document.getElementById("demoFill").addEventListener("click", () => {
        FFCart.set([
          { id:"malini", name:"Малини", weight:"250 г", price:6.50, qty:2 },
          { id:"borovinki", name:"Боровинки", weight:"250 г", price:7.90, qty:1 },
          { id:"paket-leten", name:"Летен микс", weight:"пакет", price:24.90, qty:1 },
        ]);
        render();
      });
      return;
    }

    const sub = FFCart.subtotal();
    const ship = sub >= 40 ? 0 : 4.90;
    area.innerHTML = `
      <div class="commerce-grid">
        <div>
          <div id="lines"></div>
          <div style="margin-top:18px"><a href="products.html" class="btn btn--ghost btn--sm">← Продължи пазаруването</a></div>
        </div>
        <aside class="summary">
          <h3 style="font-size:22px;margin-bottom:14px">Резюме</h3>
          <div class="summary__row"><span>Междинна сума</span><span>${FFmoney(sub)}</span></div>
          <div class="summary__row"><span>Доставка</span><span>${ship === 0 ? "безплатна" : FFmoney(ship)}</span></div>
          ${ship>0 ? `<div class="muted" style="font-size:13px">Добави за ${FFmoney(40-sub)} за безплатна доставка</div>` : ""}
          <div class="summary__row total"><span>Общо</span><span>${FFmoney(sub+ship)}</span></div>
          <a href="checkout.html" class="btn btn--primary btn--full btn--lg" style="margin-top:16px">Към касата</a>
          <div class="note-fresh" style="margin-top:16px;width:100%;justify-content:center">Берем в деня на доставката</div>
        </aside>
      </div>`;
    document.querySelector(".note-fresh").innerHTML = I.leaf + " Берем в деня на доставката";

    document.getElementById("lines").innerHTML = items.map((it) => `
      <div class="line-item" data-product data-id="${it.id}">
        <div class="ph"><span class="ph__label" style="font-size:9px">${it.name}</span></div>
        <div>
          <div style="font-family:var(--font-head);font-size:19px;font-weight:var(--h-weight)">${it.name}</div>
          <div class="muted" style="font-size:13.5px">${it.weight} · ${FFmoney(it.price)}</div>
          <div style="display:flex;gap:14px;align-items:center;margin-top:10px">
            <div class="stepper">
              <button data-dir="down">−</button>
              <input type="number" value="${it.qty}" min="1" inputmode="numeric">
              <button data-dir="up">+</button>
            </div>
            <button class="btn--link" data-remove style="color:var(--muted);font-size:13.5px;text-decoration:underline">Премахни</button>
          </div>
        </div>
        <div class="li-price" style="font-weight:700;font-size:18px">${FFmoney(it.price*it.qty)}</div>
      </div>`).join("");

    // wire qty + remove
    document.querySelectorAll(".line-item").forEach((row) => {
      const id = row.dataset.id;
      row.querySelector("input").addEventListener("change", (e) => {
        FFCart.setQty(id, parseInt(e.target.value,10)||1); render();
      });
      row.querySelector("[data-remove]").addEventListener("click", () => { FFCart.remove(id); render(); });
    });
  }
  render();
</script>
</body>
</html>
