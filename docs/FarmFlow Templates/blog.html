<!DOCTYPE html>
<html lang="bg" data-theme="priroda">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Влог · Горска Градина</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Commissioner:wght@300;400;500;600;700&family=Onest:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ff_theme')||'priroda')}catch(e){}</script>
<link rel="stylesheet" href="assets/theme.css">
<link rel="stylesheet" href="assets/main.css">
<link rel="stylesheet" href="assets/home-themes.css">
</head>
<body>
<div id="site-header" data-active="blog.html"></div>

<main data-screen-label="Blog list">
  <div class="wrap">
    <nav class="breadcrumb"><a href="home.html">Начало</a> / <span>Влог</span></nav>
  </div>

  <section class="section--tight is-optional">
    <div class="wrap">
      <span class="opt-inline opt-badge">Опционален модул · влог/съдържание</span>
      <div class="section-head">
        <span class="eyebrow">Влог</span>
        <h2 style="margin-top:8px">Рецепти, съвети и истории от полето</h2>
        <p>Пишем за това, което знаем най-добре — плодове, сезони и малки кухненски тайни.</p>
      </div>

      <div data-tabs data-tabs-target="#blogGrid" style="display:flex;gap:10px;flex-wrap:wrap;margin:26px 0">
        <button class="chip is-active" data-tab="all">Всички</button>
        <button class="chip" data-tab="recepti">Рецепти</button>
        <button class="chip" data-tab="pole">От полето</button>
        <button class="chip" data-tab="saveti">Съвети</button>
      </div>

      <!-- featured first post -->
      <a href="article.html" class="card" id="featPost" style="display:grid;grid-template-columns:1.1fr 1fr;overflow:hidden;margin-bottom:26px"></a>

      <div class="grid grid--3" id="blogGrid" data-tab-panels></div>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script src="assets/app.js"></script>
<script>
  const POSTS = [
    { t:"5 начина да съхраниш малините за зимата", e:"От замразяване до конфитюр — как да удължиш сезона на любимия плод без да губиш аромата.", c:"Рецепти", cat:"recepti", d:"12 май 2026", r:"4 мин" },
    { t:"Защо обираме на ръка (и защо има значение)", e:"Машината е по-бърза, но ръката усеща зрелостта. Разказваме защо избрахме по-трудния път.", c:"От полето", cat:"pole", d:"28 апр 2026", r:"6 мин" },
    { t:"Домашен сироп от бъз — стъпка по стъпка", e:"Цветовете на бъза цъфтят само две седмици. Ето как ги превръщаме в златен сироп.", c:"Рецепти", cat:"recepti", d:"9 апр 2026", r:"5 мин" },
    { t:"Как да познаеш наистина зрялата боровинка", e:"Цвят, восъчен налеп и стегнатост — три признака, които издават качествения плод.", c:"Съвети", cat:"saveti", d:"22 мар 2026", r:"3 мин" },
    { t:"Един ден от живота в градината", e:"Ставаме в 5 сутринта. Разказваме какво се случва, преди плодовете да стигнат до теб.", c:"От полето", cat:"pole", d:"3 мар 2026", r:"7 мин" },
    { t:"Палачинки с горски плодове за неделя", e:"Бърза рецепта, която превръща шепа боровинки в семеен ритуал.", c:"Рецепти", cat:"recepti", d:"18 фев 2026", r:"4 мин" },
  ];
  const feat = POSTS[0];
  document.getElementById("featPost").innerHTML = `
    <div class="ph" style="aspect-ratio:auto;min-height:280px;border-radius:0"><span class="ph__label">Голяма корица · ${feat.c}</span></div>
    <div style="padding:clamp(22px,3vw,40px);display:flex;flex-direction:column;justify-content:center">
      <span class="tag" style="align-self:flex-start">Препоръчано · ${feat.c}</span>
      <h3 style="font-size:clamp(24px,3vw,34px);margin:14px 0 12px">${feat.t}</h3>
      <p class="muted">${feat.e}</p>
      <div class="muted" style="font-size:13.5px;margin-top:16px">${feat.d} · ${feat.r} четене</div>
    </div>`;
  document.querySelector("#featPost .ph").style.aspectRatio = "auto";

  document.getElementById("blogGrid").innerHTML = POSTS.slice(1).map((p) => `
    <a href="article.html" class="card" data-cat="${p.cat}">
      <div class="ph" style="aspect-ratio:16/10"><span class="ph__label">Корица · ${p.c} · 16:10</span></div>
      <div style="padding:20px 20px 24px;display:flex;flex-direction:column;flex:1">
        <span class="tag" style="align-self:flex-start">${p.c}</span>
        <h3 style="font-size:20px;margin:12px 0 10px">${p.t}</h3>
        <p class="muted" style="font-size:14.5px">${p.e}</p>
        <div class="muted" style="font-size:13px;margin-top:14px">${p.d} · ${p.r}</div>
      </div>
    </a>`).join("");
</script>
</body>
</html>
