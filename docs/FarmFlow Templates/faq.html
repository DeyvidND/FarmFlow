<!DOCTYPE html>
<html lang="bg" data-theme="priroda">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ЧЗВ · Горска Градина</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Commissioner:wght@300;400;500;600;700&family=Onest:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ff_theme')||'priroda')}catch(e){}</script>
<link rel="stylesheet" href="assets/theme.css">
<link rel="stylesheet" href="assets/main.css">
<link rel="stylesheet" href="assets/home-themes.css">
</head>
<body>
<div id="site-header" data-active="faq.html"></div>

<main data-screen-label="FAQ">
  <div class="wrap">
    <nav class="breadcrumb"><a href="home.html">Начало</a> / <span>ЧЗВ</span></nav>
  </div>

  <section class="section--tight">
    <div class="wrap" style="max-width:820px">
      <div class="section-head center" style="margin-inline:auto">
        <span class="eyebrow">Често задавани въпроси</span>
        <h2 style="margin-top:8px">Каквото обикновено ни питат</h2>
        <p>Не намираш отговор? <a href="contact.html" style="color:var(--primary);text-decoration:underline">Пиши ни</a> — отговаряме лично.</p>
      </div>

      <div class="acc" style="margin-top:32px" id="faq"></div>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script src="assets/app.js"></script>
<script>
  const FAQ = [
    { q:"Биологични ли са, пръскал ли си ги?", a:"Да, отглеждаме всичко без химически пръскания и изкуствени торове. Срещу вредители използваме само природни методи, а почвата подхранваме с компост. Това е причината плодовете да са дребни, но наситено ароматни." },
    { q:"Подходящи ли са за малки деца?", a:"Напълно. Точно защото няма пръскане, плодовете ни често са първият избор на родители за бебешко меню. Препоръчваме само да ги измиете внимателно преди консумация, както всяко прясно плодче." },
    { q:"Колко време са свежи плодовете?", a:"Берем в деня на доставката, така че получавате максимална свежест. В хладилник малините и боровинките се запазват 2–3 дни, къпините малко повече. Съветваме да не ги миете предварително — само преди ядене." },
    { q:"Сам ли се занимаваш с всичко?", a:"Стопанството е семейно. Брането, пакетирането и комуникацията с клиентите минават през ръцете на семейството, а в пиковите дни помагат и близки. Затова всяка поръчка получава лично внимание." },
    { q:"Как протича доставката?", a:"Доставяме до адрес с куриер или до офис на Еконт. При поръчка избирате удобен ден и часови слот. Куриерът се обажда преди да пристигне. Безплатна доставка за поръчки над 40,00 лв." },
    { q:"Мога ли да поръчам пакет по поръчка?", a:"Разбира се. Пишете ни какво обичате и за колко души, и съставяме персонална кутия. Това е чест избор за подаръци и специални поводи." },
  ];
  document.getElementById("faq").innerHTML = FAQ.map((f, i) => `
    <div class="acc__item${i===0?" open":""}">
      <button class="acc__head"><span>${f.q}</span><span class="ico">+</span></button>
      <div class="acc__body"><div class="acc__body-inner">${f.a}</div></div>
    </div>`).join("");
</script>
</body>
</html>
