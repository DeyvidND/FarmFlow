<!DOCTYPE html>
<html lang="bg" data-theme="priroda">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Отзиви · Горска Градина</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Commissioner:wght@300;400;500;600;700&family=Onest:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ff_theme')||'priroda')}catch(e){}</script>
<link rel="stylesheet" href="assets/theme.css">
<link rel="stylesheet" href="assets/main.css">
<link rel="stylesheet" href="assets/home-themes.css">
</head>
<body>
<div id="site-header" data-active="reviews.html"></div>

<main data-screen-label="Reviews">
  <div class="wrap">
    <nav class="breadcrumb"><a href="home.html">Начало</a> / <span>Отзиви</span></nav>
  </div>

  <section class="section--tight is-optional">
    <div class="wrap">
      <span class="opt-inline opt-badge">Опционален модул · може да се изключи</span>
      <div class="split" style="align-items:center">
        <div class="section-head" style="margin:0">
          <span class="eyebrow">Отзиви</span>
          <h2 style="margin-top:8px">Какво казват клиентите</h2>
          <p>Над 1 200 поръчки и средна оценка 4,9 от 5. Ето няколко от любимите ни думи.</p>
        </div>
        <div style="display:flex;gap:28px;align-items:center;justify-content:flex-end;flex-wrap:wrap">
          <div class="center"><div class="big-404" style="font-size:64px;line-height:1">4,9</div><div class="stars" id="bigStars"></div></div>
          <div style="font-size:14.5px;color:var(--muted);max-width:18ch">от 318 оценки<br>в Google и Facebook</div>
        </div>
      </div>

      <div class="grid grid--3" style="margin-top:34px" id="reviews"></div>
    </div>
  </section>

  <!-- leave a review -->
  <section class="section--tight">
    <div class="wrap">
      <div class="card" style="padding:clamp(24px,4vw,40px);max-width:720px;margin-inline:auto">
        <h3 style="font-size:26px;margin-bottom:6px">Остави ревю</h3>
        <p class="muted" style="margin-bottom:22px">Поръчвал/а си от нас? Сподели впечатленията си — помага на други да изберат.</p>
        <form class="stack" onsubmit="event.preventDefault();FFtoast('Благодарим за ревюто!');this.reset();document.querySelectorAll('#rateInput .star').forEach(s=>s.classList.remove('on'));">
          <div class="field-row">
            <div class="field"><label>Име</label><input class="input" placeholder="Твоето име" required></div>
            <div class="field"><label>Град</label><input class="input" placeholder="напр. Варна"></div>
          </div>
          <div class="field">
            <label>Оценка</label>
            <div id="rateInput" style="display:flex;gap:6px;color:var(--accent)"></div>
          </div>
          <div class="field"><label>Твоето ревю</label><textarea class="textarea" placeholder="Разкажи ни..." required></textarea></div>
          <button class="btn btn--primary" type="submit" style="align-self:flex-start">Изпрати ревю</button>
        </form>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script src="assets/app.js"></script>
<script>
  const I = window.FFICON;
  const star = I.star;
  const starsHTML = (n) => Array.from({length:5}, (_,i) => `<span style="opacity:${i<n?1:.25}">${star}</span>`).join("");
  document.getElementById("bigStars").innerHTML = starsHTML(5);

  const REVIEWS = [
    { n:"Мария Д.", c:"Варна", r:5, t:"Малините са невероятни — наистина се усеща, че са брани същия ден. Децата ги изяждат преди да съм ги прибрала." },
    { n:"Иван П.", c:"Девня", r:5, t:"Поръчвам всяка седмица. Доставката е точна, плодовете — безупречни. Сиропът от бъз е любим вкъщи." },
    { n:"Елена Г.", c:"Варна", r:5, t:"Семейният пакет беше идеален подарък за рожден ден. Опаковката е красива, а вкусът — още по-добър." },
    { n:"Георги Т.", c:"Аксаково", r:4, t:"Качеството е отлично. Единствено бих искал по-голям избор от сладка през зимата." },
    { n:"Радостина К.", c:"Варна", r:5, t:"Личи си, че зад това стои семейство, на което му пука. Отношението е топло, а боровинките — най-добрите." },
    { n:"Стефан М.", c:"Белослав", r:5, t:"Берем днес – доставяме днес не е просто реклама. Разликата с магазинните плодове е огромна." },
  ];
  document.getElementById("reviews").innerHTML = REVIEWS.map((r) => `
    <article class="card review-card">
      <div class="stars">${starsHTML(r.r)}</div>
      <p>„${r.t}“</p>
      <div class="who">
        <div class="ph avatar"></div>
        <div><b>${r.n}</b><span>${r.c}</span></div>
      </div>
    </article>`).join("");

  // interactive rating input
  const rate = document.getElementById("rateInput");
  rate.innerHTML = Array.from({length:5}, (_,i) => `<button type="button" class="star" data-v="${i+1}" style="width:30px;height:30px">${star}</button>`).join("");
  rate.querySelectorAll(".star").forEach((s) => {
    s.style.opacity = ".3";
    s.addEventListener("click", () => {
      const v = +s.dataset.v;
      rate.querySelectorAll(".star").forEach((x) => x.style.opacity = (+x.dataset.v <= v) ? "1" : ".3");
    });
  });
</script>
</body>
</html>
