<!DOCTYPE html>
<html lang="bg" data-theme="priroda">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Продукти · Горска Градина</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Commissioner:wght@300;400;500;600;700&family=Onest:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('ff_theme')||'priroda')}catch(e){}</script>
<link rel="stylesheet" href="assets/theme.css">
<link rel="stylesheet" href="assets/main.css">
<link rel="stylesheet" href="assets/home-themes.css">
</head>
<body>
<div id="site-header" data-active="products.html"></div>

<main data-screen-label="Catalog">
  <div class="wrap">
    <nav class="breadcrumb"><a href="home.html">Начало</a> / <span>Продукти</span></nav>
  </div>

  <section class="section--tight">
    <div class="wrap">
      <div class="section-head">
        <span class="eyebrow">Магазин</span>
        <h2 style="margin-top:8px">Цялата реколта на едно място</h2>
        <p>Избери категория. Всичко се бере в деня на доставка — затова наличностите се обновяват сутрин.</p>
      </div>

      <div class="chips-row" data-tabs data-tabs-target="#catalogGrid"
           style="display:flex;gap:10px;flex-wrap:wrap;margin:28px 0 26px">
        <button class="chip is-active" data-tab="all">Всички</button>
        <button class="chip" data-tab="fruit">Пресни плодове</button>
        <button class="chip" data-tab="syrup">Сиропи</button>
        <button class="chip" data-tab="jam">Горски сладка</button>
        <button class="chip" data-tab="bundle">Сезонни пакети</button>
      </div>

      <div class="grid grid--4" id="catalogGrid" data-tab-panels></div>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script src="assets/app.js"></script>
<script>
  const I = window.FFICON;
  const PRODUCTS = [
    { id:"malini", cat:"fruit", name:"Малини", weight:"250 г", price:6.50, tag:"био" },
    { id:"borovinki", cat:"fruit", name:"Боровинки", weight:"250 г", price:7.90, tag:"био" },
    { id:"kapini", cat:"fruit", name:"Къпини", weight:"300 г", price:5.80, tag:"био" },
    { id:"yagodi", cat:"fruit", name:"Ягоди", weight:"500 г", price:6.20, tag:"био" },
    { id:"chereshi", cat:"fruit", name:"Череши", weight:"500 г", price:7.40, tag:"сезон" },
    { id:"frambo-cherni", cat:"fruit", name:"Черен френско грозде", weight:"250 г", price:6.90 },
    { id:"sirop-baz", cat:"syrup", name:"Сироп от бъз", weight:"500 мл", price:9.40 },
    { id:"sirop-malina", cat:"syrup", name:"Сироп от малина", weight:"500 мл", price:9.80 },
    { id:"sirop-mента", cat:"syrup", name:"Сироп от мента", weight:"500 мл", price:8.60 },
    { id:"sladko-gorsko", cat:"jam", name:"Горско сладко", weight:"314 г", price:8.20 },
    { id:"sladko-kapina", cat:"jam", name:"Сладко от къпини", weight:"314 г", price:7.80 },
    { id:"sladko-borovinka", cat:"jam", name:"Сладко от боровинки", weight:"314 г", price:9.10 },
    { id:"paket-leten", cat:"bundle", name:"Летен микс", weight:"4 вида · 1 кг", price:24.90, tag:"пакет" },
    { id:"paket-semeen", cat:"bundle", name:"Семеен пакет", weight:"6 вида · 2 кг", price:42.00, tag:"пакет" },
  ];
  document.getElementById("catalogGrid").innerHTML = PRODUCTS.map((p) => `
    <article class="card product" data-product data-cat="${p.cat}">
      <a href="product.html" class="ph">
        ${p.tag ? `<span class="tag" style="position:absolute;top:12px;left:12px">${p.tag}</span>` : ""}
        <span class="ph__label">${p.name}</span>
      </a>
      <div class="product__body">
        <a href="product.html"><h3 class="product__name">${p.name}</h3></a>
        <div class="product__meta">${p.weight}</div>
        <div class="product__price">${FFmoney(p.price)}</div>
        <div class="product__foot">
          <div class="stepper" aria-label="Количество">
            <button data-dir="down" aria-label="по-малко">−</button>
            <input type="number" value="1" min="1" inputmode="numeric">
            <button data-dir="up" aria-label="повече">+</button>
          </div>
          <button class="btn btn--primary btn--sm btn--full" data-add-cart
            data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-weight="${p.weight}">
            ${I.cart} Добави
          </button>
        </div>
      </div>
    </article>`).join("");
</script>
</body>
</html>
