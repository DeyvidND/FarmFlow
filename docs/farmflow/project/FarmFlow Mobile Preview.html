<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ФермериБГ — преглед на устройства</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #26251f; min-height: 100vh; padding: 36px 24px 60px;
    font-family: "Commissioner", system-ui, sans-serif; color: #e9e4d7;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
  p.note { font-size: 13.5px; color: #a39d8c; max-width: 520px; text-align: center; line-height: 1.5; margin-bottom: 22px; }
  p.note b { color: #d8d2c2; font-weight: 700; }
  .frame {
    background: #0d0d0c; border-radius: 46px; padding: 13px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55), inset 0 0 0 2px #2a2a26;
    position: relative;
  }
  .screen { width: 390px; border-radius: 34px; overflow: hidden; background: #F3EEE2; }
  .statusbar {
    height: 30px; background: #F3EEE2; position: relative;
    display: flex; align-items: center; justify-content: space-between; padding: 0 22px;
    font-size: 12px; font-weight: 700; color: #26241d;
  }
  .statusbar::before {
    content: ""; position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 22px; background: #0d0d0c; border-radius: 0 0 14px 14px;
  }
  .frame iframe { width: 390px; height: 770px; border: none; background: #F3EEE2; display: block; }
</style>
</head>
<body>
<h1>📱 ФермериБГ — мобилен изглед</h1>
<p class="note">Това е истинското приложение, поместено в телефон с ширина <b>390px</b>. Натисни иконата <b>☰</b> горе вляво, за да отвориш менюто, и навигирай между страниците както на телефон.</p>
<div class="frame">
  <div class="screen">
    <div class="statusbar"><span>9:41</span><span>ФермериБГ</span></div>
    <iframe id="phone" src="index.html" title="ФермериБГ на телефон"></iframe>
  </div>
</div>
</body>
</html>
