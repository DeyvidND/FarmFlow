# Infrastructure — Postgres + Redis for FarmFlow production (Dokploy).
#
# Deploy as a SEPARATE Dokploy "Docker Compose" app. Nothing here builds in CI —
# stock images, pulled + run on the VM. Data persists in NAMED VOLUMES on the VM.
#
# The app compose (docker-compose.prod.yml) reaches these by SERVICE NAME over
# the shared external `dokploy-network`:
#   DATABASE_URL=postgresql://farmflow:<POSTGRES_PASSWORD>@farmflow-postgres:5432/farmflow
#   REDIS_URL=redis://:<REDIS_PASSWORD>@farmflow-redis:6379
#
# Set POSTGRES_PASSWORD and REDIS_PASSWORD in this Dokploy app's Environment.
# No host ports are published — only the other containers on dokploy-network can
# reach the DB/cache. Reach Postgres for migrations via `docker exec` on the VM.
#
# ⚠️ BACK UP farmflow_pgdata — this is your ONLY copy of the data. Use Dokploy
# volume backups (to R2/S3) or a `pg_dump` cron.

services:
  farmflow-postgres:
    image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
    restart: unless-stopped
    networks: [dokploy-network]
    environment:
      POSTGRES_DB: farmflow
      POSTGRES_USER: farmflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the Dokploy env}
    volumes:
      - farmflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmflow -d farmflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  farmflow-redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    networks: [dokploy-network]
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in the Dokploy env}"]
    volumes:
      - farmflow_redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dokploy-network:
    external: true

volumes:
  farmflow_pgdata:
  farmflow_redisdata:
