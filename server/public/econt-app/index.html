<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Масов внос на пратки</title>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root { --ok: #e8f5e9; --warn: #fff8e1; --err: #ffebee; --line: #ddd; --brand: #2e7d32; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1100px; margin: 0 auto;
      padding: 1rem max(1rem, env(safe-area-inset-left)) 3rem;
      color: #222; line-height: 1.4;
    }
    h1 { font-size: 1.35rem; margin: 0 0 12px; }

    /* Inputs: 16px font stops iOS zoom-on-focus; comfy tap height */
    input, select { border: 1px solid #ccc; padding: 8px; font-size: 16px; border-radius: 6px; background: #fff; }
    /* keep the native select caret — farmers need the visual dropdown cue */
    button {
      padding: 10px 16px; cursor: pointer; font-size: 15px; border-radius: 6px;
      min-height: 44px; border: 1px solid #bbb; background: #f5f5f5;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .primary { background: var(--brand); color: #fff; border-color: var(--brand); font-weight: 600; }
    a { color: var(--brand); }
    .muted { color: #777; font-size: 12px; }
    .error { color: #c62828; }

    /* Control bars */
    .bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 10px 0; }
    .bar input, .bar select { min-height: 44px; }
    .grow { flex: 1 1 180px; }

    /* Status pills */
    .pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { padding: 4px 10px; border-radius: 999px; font-size: 13px; white-space: nowrap; }
    .pill.ok { background: var(--ok); } .pill.warn { background: var(--warn); } .pill.err { background: var(--err); }

    /* Table (desktop) */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { border: 1px solid var(--line); padding: 4px 6px; text-align: left; vertical-align: middle; }
    tr.ok { background: var(--ok); } tr.warn { background: var(--warn); } tr.error { background: var(--err); }
    td input, td select { width: 100%; }
    .del { background: #fff; border-color: #e0a0a0; color: #c62828; min-height: 38px; padding: 6px 10px; }

    /* ── Mobile: table rows become stacked cards ── */
    @media (max-width: 760px) {
      body { padding: .75rem .75rem 3rem; }
      h1 { font-size: 1.2rem; }
      .bar { flex-direction: column; align-items: stretch; gap: 10px; }
      .bar > * { width: 100% !important; }
      .bar.pills-bar { flex-direction: row; }

      table, thead, tbody, th, td, tr { display: block; width: 100%; }
      thead { position: absolute; left: -9999px; top: -9999px; }
      tr { margin: 0 0 16px; border: 2px solid #ccc; border-radius: 12px; padding: 8px 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
      tr.ok { border-color: #a5d6a7; } tr.warn { border-color: #ffe082; } tr.error { border-color: #ef9a9a; }
      td { border: none; border-bottom: 1px solid rgba(0,0,0,.08); padding: 8px 2px; display: grid; grid-template-columns: 96px 1fr; gap: 10px; align-items: center; }
      td:last-child { border-bottom: none; }
      td::before { content: attr(data-label); font-weight: 600; color: #555; font-size: 12px; }
      td:empty { display: none; }
      .del { width: 100%; }
    }
  </style>
</head>
<body x-data="importApp()">
  <h1>Масов внос на пратки</h1>

  <!-- Login -->
  <template x-if="!token">
    <div class="bar">
      <input class="grow" type="email" placeholder="Имейл" x-model="email" autocomplete="username" />
      <input class="grow" type="password" placeholder="Парола" x-model="password" autocomplete="current-password" @keydown.enter="login()" />
      <button class="primary" @click="login()">Вход</button>
      <span class="error" x-text="loginError"></span>
    </div>
  </template>

  <!-- App -->
  <template x-if="token">
    <div>
      <div class="bar">
        <select class="grow" x-model="settings.carrier"><option value="econt">Econt</option><option value="speedy">Speedy</option></select>
        <select class="grow" x-model="settings.currency"><option value="EUR">EUR</option><option value="BGN">BGN</option></select>
        <input class="grow" type="number" inputmode="numeric" placeholder="Тегло (г) по подр." x-model.number="settings.weightGrams" />
        <input class="grow" type="number" inputmode="numeric" placeholder="Speedy serviceId" x-model.number="settings.speedyServiceId" />
        <input class="grow" type="file" accept=".xlsx,.csv" @change="pick($event)" />
        <button class="primary" @click="upload()" :disabled="!file">Качи и провери</button>
        <button @click="downloadTemplate()">Свали шаблон</button>
        <button @click="logout()">Изход</button>
      </div>
      <p class="muted" x-show="ai" x-text="ai"></p>
      <p class="error" x-text="error"></p>

      <template x-if="rows.length">
        <div>
          <div class="bar pills-bar">
            <span class="pills">
              <span class="pill ok" x-text="`Зелени: ${count('ok')}`"></span>
              <span class="pill warn" x-text="`Жълти: ${count('warn')}`"></span>
              <span class="pill err" x-text="`Червени: ${count('error')}`"></span>
            </span>
          </div>
          <div class="bar">
            <button class="primary" @click="commit()" :disabled="committing" x-text="committing ? 'Създавам…' : 'Създай пратки'"></button>
            <a x-show="labelIds('econt').length" :href="labelsUrl('econt')" target="_blank">⬇ Етикети (Econt)</a>
            <a x-show="labelIds('speedy').length" :href="labelsUrl('speedy')" target="_blank">⬇ Етикети (Speedy)</a>
          </div>

          <div class="table-wrap">
            <table>
              <thead><tr><th>#</th><th>Получател</th><th>Телефон</th><th>Реж.</th><th>Град</th><th>Офис/Адрес</th><th>Тегло(г)</th><th>НП(ст.)</th><th>Куриер</th><th>Проблеми</th><th></th></tr></thead>
              <tbody>
                <template x-for="r in rows" :key="r.id">
                  <tr :class="r.validationStatus">
                    <td data-label="#" x-text="r.rowIndex"></td>
                    <td data-label="Получател"><input x-model="r.receiverName" @change="save(r)" /></td>
                    <td data-label="Телефон"><input type="tel" inputmode="tel" x-model="r.receiverPhone" @change="save(r)" /></td>
                    <td data-label="Режим"><select x-model="r.deliveryMode" @change="save(r)"><option value="office">офис</option><option value="address">адрес</option></select></td>
                    <td data-label="Град"><input x-model="r.city" @change="save(r)" /></td>
                    <td :data-label="r.deliveryMode === 'office' ? 'Офис' : 'Адрес'">
                      <input x-show="r.deliveryMode === 'office'" x-model="r.office" @change="save(r)" placeholder="Офис" />
                      <input x-show="r.deliveryMode !== 'office'" x-model="r.address" @change="save(r)" placeholder="Адрес" />
                    </td>
                    <td data-label="Тегло (г)"><input type="number" inputmode="numeric" x-model.number="r.weightGrams" @change="save(r)" /></td>
                    <td data-label="НП (ст.)"><input type="number" inputmode="numeric" x-model.number="r.codAmountStotinki" @change="save(r)" /></td>
                    <td data-label="Куриер"><select x-model="r.carrier" @change="save(r)"><option value="econt">Econt</option><option value="speedy">Speedy</option></select></td>
                    <td data-label="Проблеми" class="muted" x-text="(r.validation?.issues||[]).map(i=>i.message).join('; ')"></td>
                    <td><button class="del" @click="del(r)">✕ Изтрий</button></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </template>
    </div>
  </template>

  <script src="/app/app.js"></script>
</body>
</html>
